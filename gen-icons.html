<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<br>
<button onclick="download()">アイコンをダウンロード</button>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  // 背景
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, s, s);
  // 丸角
  ctx.beginPath();
  const r = s * 0.15;
  ctx.moveTo(r, 0); ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s); ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#1a1a2e';
  ctx.fill();
  // 絵文字
  ctx.font = s * 0.55 + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🧟', s / 2, s * 0.45);
  // テキスト
  ctx.font = 'bold ' + s * 0.13 + 'px Arial';
  ctx.fillStyle = '#e63946';
  ctx.fillText('SURVIVE', s / 2, s * 0.78);
  ctx.fillStyle = '#ffffff';
  ctx.fillText('DANCE', s / 2, s * 0.90);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

function download() {
  ['c192', 'c512'].forEach(id => {
    const canvas = document.getElementById(id);
    const size = id === 'c192' ? 192 : 512;
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'icon-' + size + '.png';
    a.click();
  });
}
</script>
</body>
</html>
