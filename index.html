<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#070A18">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Survive Dance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #070A18; width: 100%; height: 100%; overflow: hidden; }
  body { display: flex; justify-content: center; align-items: center; }
  canvas { display: block; image-rendering: auto; }

  #loading {
    position: fixed; inset: 0;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    background: #070A18; z-index: 999; gap: 20px;
  }
  #loading .ld-title {
    font-family: Orbitron, 'Arial Black', sans-serif;
    font-size: 32px; color: #3DD8FF; letter-spacing: 4px;
    text-shadow: 0 0 24px #3DD8FF;
  }
  #loading .ld-sub {
    font-family: Arial, sans-serif;
    font-size: 12px; color: #3A4560; letter-spacing: 3px;
  }
  #loading .ld-bar-wrap {
    width: 220px; height: 4px;
    background: #10162A; border-radius: 2px; overflow: hidden;
  }
  #loading .ld-bar {
    height: 100%; background: #3DD8FF; border-radius: 2px;
    animation: ld-pulse 1.6s ease-in-out infinite;
  }
  @keyframes ld-pulse {
    0%   { width: 10%; opacity: 0.6; }
    60%  { width: 85%; opacity: 1;   }
    100% { width: 100%; opacity: 0;  }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="ld-title">SURVIVE DANCE</div>
  <div class="ld-bar-wrap"><div class="ld-bar"></div></div>
  <div class="ld-sub">LOADING</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script src="game.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function() {});
  }
</script>
</body>
</html>
